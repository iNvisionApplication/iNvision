<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Dashboard</title>
</head>
<body>
<section>
    <!-- all page content goes here -->
    <div class="page-header">
        <div class="page-heading">
            Overview
            <span>System summary and recent activity</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card navy">
            <div class="stat-label">Total Assets</div>
            <div class="stat-value" th:text="${totalAssets}">0</div>
            <div class="stat-sub" th:text="${availableAssets} + ' available'">0 available</div>
        </div>
        <div class="stat-card steel">
            <div class="stat-label">Active Loans</div>
            <div class="stat-value" th:text="${activeLoans}">0</div>
            <div class="stat-sub">Currently checked out</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Overdue</div>
            <div class="stat-value" th:text="${overdueLoans}">0</div>
            <div class="stat-sub">Require immediate action</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Pending Requests</div>
            <div class="stat-value" th:text="${pendingRequests}">0</div>
            <div class="stat-sub">Awaiting approval</div>
        </div>
    </div>
</section>
</body>
</html>
