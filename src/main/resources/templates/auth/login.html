<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — iNVision Asset Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-box">

        <!-- Logo -->
        <div class="auth-logo">
            <svg width="44" height="44" viewBox="0 0 38 38" fill="none">
                <rect x="9" y="14" width="5" height="18" fill="#16285a"/>
                <circle cx="11.5" cy="9" r="3.5" fill="#16285a"/>
                <polygon points="16,14 21,14 30,28 30,32 25,32 16,18" fill="#6b89b8" opacity="0.8"/>
                <polygon points="16,14 21,14 21,32 16,32" fill="#16285a"/>
                <polygon points="25,14 30,14 30,32 25,32" fill="#6b89b8"/>
            </svg>
            <div class="auth-logo-text">
                <div class="logo-name">i<span>N</span>Vision</div>
                <span class="logo-sub">Asset Management</span>
            </div>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to access the asset management system</p>

        <div th:if="${param.error}" class="alert alert-error" style="margin: 0 0 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>Invalid email or password. Please try again.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success" style="margin: 0 0 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span>You have been signed out successfully.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="username">Email Address</label>
                <input class="form-control" type="email" id="username" name="username"
                       placeholder="you@company.com" autocomplete="email" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required/>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign In
            </button>
        </form>

        <div class="brand-rule">or</div>

        <p class="auth-link">
            Don't have an account? <a th:href="@{/register}">Request access</a>
        </p>

        <p style="text-align:center;margin-top:24px;font-size:10px;color:var(--text-muted);letter-spacing:0.06em;">
            LOANING ASSETS. EMPOWERING POSSIBILITIES.
        </p>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
