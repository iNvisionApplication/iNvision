<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">iNVision AMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <!-- iNVision Logo SVG -->
        <svg class="logo-mark" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- i stem -->
            <rect x="9" y="14" width="5" height="18" fill="#ffffff"/>
            <!-- i dot -->
            <circle cx="11.5" cy="9" r="3.5" fill="#ffffff"/>
            <!-- N shape — dark navy left stroke, steel-blue right -->
            <polygon points="16,14 21,14 30,28 30,32 25,32 16,18" fill="#a8c0d9" opacity="0.85"/>
            <polygon points="16,14 21,14 21,32 16,32" fill="#ffffff" opacity="0.9"/>
            <polygon points="25,14 30,14 30,32 25,32" fill="#a8c0d9"/>
        </svg>

        <div class="logo-wordmark">
            <span class="logo-name">i<span>N</span>Vision</span>
            <span class="logo-sub">Asset Management</span>
        </div>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar"
             th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
        <div class="user-info">
            <span class="user-name" sec:authentication="name">User</span>
            <span class="user-role">
                <span sec:authorize="hasRole('ADMIN')">Administrator</span>
                <span sec:authorize="hasRole('MANAGER')">Manager</span>
                <span sec:authorize="hasRole('BORROWER')">Borrower</span>
            </span>
        </div>
    </div>

    <ul class="nav-links">
        <li class="nav-section-label">Main</li>
        <li>
            <a th:href="@{/dashboard}"
               th:classappend="${currentUri == ('dashboard') ? 'active' : ''}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                Dashboard
            </a>
        </li>
        <li>
            <a th:href="@{/assets}"
               th:classappend="${#strings.startsWith(currentUri, '/assets') ? 'active' : ''}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>
                Assets
            </a>
        </li>
        <li>
            <a th:href="@{/loans}"
               th:classappend="${#strings.startsWith(currentUri, '/loans') ? 'active' : ''}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Loans
                <span class="nav-badge" id="pendingBadge"
                      th:if="${pendingCount != null and pendingCount > 0}"
                      th:text="${pendingCount}">0</span>
            </a>
        </li>

        <li class="nav-section-label" sec:authorize="hasAnyRole('ADMIN','MANAGER')">Reports</li>
        <li sec:authorize="hasAnyRole('ADMIN','MANAGER')">
            <a th:href="@{/reports}"
               th:classappend="${#strings.startsWith(currentUri, '/reports') ? 'active' : ''}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                Reports
            </a>
        </li>

        <li class="nav-section-label" sec:authorize="hasRole('ADMIN')">Administration</li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/users}"
               th:classappend="${#strings.startsWith(currentUri, '/users') ? 'active' : ''}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Users
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sign Out
            </button>
        </form>
        <div style="margin-top:12px;text-align:center;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.06em;">
            iNVision AMS · Loaning Assets.<br>Empowering Possibilities.
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main-content" id="mainContent">
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <h1 class="page-title" th:replace="${title}">Page</h1>
        </div>
        <div class="topbar-right">
            <div class="system-time" id="systemTime"></div>
        </div>
    </header>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span th:text="${successMessage}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-error" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span th:text="${errorMessage}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>

    <!-- Page Content -->
    <div class="content-area" th:replace="${content}">
        Content goes here
    </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
